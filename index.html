<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

    }

    header{
      background:linear-gradient(90deg,#a50044,#004d98);
      padding:18px;
      text-align:center;
      font-size:30px;
      font-weight:bold;
      letter-spacing:2px;
